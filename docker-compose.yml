version: "3.8"

networks:
  pipeline-net:
    driver: bridge

# ──────────────────────────────────────────────
# VOLUMES
# ──────────────────────────────────────────────
volumes:
  hadoop-namenode:
  hadoop-datanode:
  influxdb-data:
  grafana-data:

services:

  # ────────────────────────────────────────────
  # ZOOKEEPER  (required by Kafka)
  # ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    networks: [pipeline-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────
  # KAFKA BROKER
  # ────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    networks: [pipeline-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ────────────────────────────────────────────
  # KAFKA TOPIC INITIALIZER
  # ────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-init
    networks: [pipeline-net]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      bash -c "
        kafka-topics --create --if-not-exists \
          --bootstrap-server kafka:9092 \
          --replication-factor 1 \
          --partitions 3 \
          --topic aircraft-states
        echo 'Topic aircraft-states created.'
      "
  # ────────────────────────────────────────────
  # HADOOP NAMENODE
  # ────────────────────────────────────────────
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    networks: [pipeline-net]
    ports:
      - "9870:9870"   # HDFS Web UI
    volumes:
      - hadoop-namenode:/hadoop/dfs/name
    environment:
      CLUSTER_NAME: pipeline-cluster
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9870/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ────────────────────────────────────────────
  # HADOOP DATANODE
  # ────────────────────────────────────────────
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    networks: [pipeline-net]
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - hadoop-datanode:/hadoop/dfs/data
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      SERVICE_PRECONDITION: "namenode:9870"

  # ────────────────────────────────────────────
  # INFLUXDB  (v2)
  # ────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    networks: [pipeline-net]
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: pipeline-org
      DOCKER_INFLUXDB_INIT_BUCKET: aircraft-states
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-super-secret-token
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ────────────────────────────────────────────
  # GRAFANA
  # ────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    networks: [pipeline-net]
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clock-panel
    depends_on:
      influxdb:
        condition: service_healthy

  # ────────────────────────────────────────────
  # FLUME PRODUCER  (HTTP Source → Kafka Sink)
  # ────────────────────────────────────────────
  flume-producer:
    build: ./flume-producer
    container_name: flume-producer
    networks: [pipeline-net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "44444:44444"   # HTTP source port
    volumes:
      - ./flume-producer/flume-producer.conf:/opt/flume/conf/flume.conf:ro

  # ────────────────────────────────────────────
  # FLUME CONSUMER  (Kafka Source → HDFS Sink)
  # ────────────────────────────────────────────
  flume-consumer:
    build: ./flume-consumer
    container_name: flume-consumer
    networks: [pipeline-net]
    depends_on:
      kafka:
        condition: service_healthy
      namenode:
        condition: service_healthy
    volumes:
      - ./flume-consumer/flume-consumer.conf:/opt/flume/conf/flume.conf:ro

  # ────────────────────────────────────────────
  # SPARK STREAMING  (Kafka → InfluxDB)
  # ────────────────────────────────────────────
  spark-streaming:
    build: ./spark
    container_name: spark-streaming
    networks: [pipeline-net]
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: aircraft-states
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: my-super-secret-token
      INFLUX_ORG: pipeline-org
      INFLUX_BUCKET: aircraft-states
    volumes:
    - ./spark:/app



  # ────────────────────────────────────────────
  # DATA SOURCE  (Random User API poller)
  # ────────────────────────────────────────────
  data-source:
    build: ./data-source
    container_name: data-source
    networks: [pipeline-net]
    depends_on:
      - flume-producer
    environment:
      FLUME_HTTP_URL: http://flume-producer:44444
      POLL_INTERVAL_SECONDS: "10"
      MAX_AIRCRAFT_PER_BATCH: "300"
      # adsb.lol mode: point | mil | ladd | pia
      ADSBLOL_MODE: "point"
      # Used only when ADSBLOL_MODE=point (radius in nautical miles, max 250)
      ADSBLOL_LAT: "30.0444"     # Cairo
      ADSBLOL_LON: "31.2357"
      ADSBLOL_RADIUS: "250"