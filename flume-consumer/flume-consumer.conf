# ============================================================
# Flume Consumer Agent
# Source : Kafka  (topic = user-events)
# Channel: File   (durable)
# Sink   : HDFS   (partitioned by date/hour)
# ============================================================

consumer.sources  = kafkaSrc
consumer.channels = fileChannel
consumer.sinks    = hdfsSink

# ── Source ──────────────────────────────────────────────────
consumer.sources.kafkaSrc.type                  = org.apache.flume.source.kafka.KafkaSource
consumer.sources.kafkaSrc.kafka.bootstrap.servers = kafka:9092
consumer.sources.kafkaSrc.kafka.topics          = aircraft-states
consumer.sources.kafkaSrc.kafka.consumer.group.id = flume-hdfs-consumer
consumer.sources.kafkaSrc.batchSize             = 1000
consumer.sources.kafkaSrc.batchDurationMillis   = 2000
consumer.sources.kafkaSrc.channels              = fileChannel

# ── Channel ─────────────────────────────────────────────────
consumer.channels.fileChannel.type              = file
consumer.channels.fileChannel.checkpointDir     = /tmp/flume/checkpoint
consumer.channels.fileChannel.dataDirs          = /tmp/flume/data
consumer.channels.fileChannel.capacity          = 100000
consumer.channels.fileChannel.transactionCapacity = 10000

# ── Sink ────────────────────────────────────────────────────
consumer.sinks.hdfsSink.type                    = hdfs
consumer.sinks.hdfsSink.hdfs.path               = hdfs://namenode:9000/aircraft-states/dt=%Y-%m-%d/hr=%H
consumer.sinks.hdfsSink.hdfs.fileType           = DataStream
consumer.sinks.hdfsSink.hdfs.filePrefix         = states-
consumer.sinks.hdfsSink.hdfs.fileSuffix         = .json
consumer.sinks.hdfsSink.hdfs.rollInterval       = 120
consumer.sinks.hdfsSink.hdfs.rollSize           = 67108864
consumer.sinks.hdfsSink.hdfs.rollCount          = 10000
consumer.sinks.hdfsSink.hdfs.batchSize          = 1000
consumer.sinks.hdfsSink.hdfs.useLocalTimeStamp  = true
consumer.sinks.hdfsSink.channel                 = fileChannel
