
producer.sources  = httpSrc
producer.channels = memChannel
producer.sinks    = kafkaSink

# ── Source ──────────────────────────────────────────────────
producer.sources.httpSrc.type    = org.apache.flume.source.http.HTTPSource
producer.sources.httpSrc.port    = 44444
producer.sources.httpSrc.handler = org.apache.flume.source.http.JSONHandler
producer.sources.httpSrc.bind    = 0.0.0.0
producer.sources.httpSrc.channels = memChannel

# ── Channel ─────────────────────────────────────────────────
producer.channels.memChannel.type              = memory
producer.channels.memChannel.capacity          = 10000
producer.channels.memChannel.transactionCapacity = 1000

# ── Sink ────────────────────────────────────────────────────
producer.sinks.kafkaSink.type                       = org.apache.flume.sink.kafka.KafkaSink
producer.sinks.kafkaSink.kafka.bootstrap.servers    = kafka:9092
producer.sinks.kafkaSink.kafka.topic                = aircraft-states
producer.sinks.kafkaSink.kafka.producer.acks        = 1
producer.sinks.kafkaSink.useFlumeEventFormat        = false
producer.sinks.kafkaSink.channel                    = memChannel
